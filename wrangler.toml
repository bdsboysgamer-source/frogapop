# Wrangler config for Frogapop (Cloudflare Pages + D1 leaderboards).
# Only needed if you deploy/preview via Wrangler. If you use the Cloudflare
# dashboard's Git integration, bind D1 as `DB` in the project settings
# instead (see LEADERBOARD_SETUP.md).
name = "frogapop"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"

# Paste the database_id from `wrangler d1 create frogapop-lb`:
[[d1_databases]]
binding = "DB"
database_name = "frogapop-lb"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"
